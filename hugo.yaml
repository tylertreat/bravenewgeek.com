baseURL: https://bravenewgeek.com/
title: Brave New Geek
theme: PaperMod
timeZone: America/Denver
locale: en-us

enableRobotsTXT: true

# WordPress paginated at 5 posts/page; keep parity so /page/N/ links hold.
pagination:
  pagerSize: 5

# Match the WordPress URL structure exactly so no inbound link breaks.
permalinks:
  page:
    posts: /:slug/
  term:
    categories: /category/:slug/
    tags: /tag/:slug/

taxonomies:
  category: categories
  tag: tags

outputs:
  home: [HTML, RSS]

services:
  rss:
    limit: 20

markup:
  goldmark:
    renderer:
      # Required for the gist <script> embeds and iframes kept as raw HTML.
      unsafe: true
  highlight:
    codeFences: true
    guessSyntax: true
    noClasses: false

params:
  env: production
  description: "Introspections of a software engineer"
  defaultTheme: auto
  comments: true # frozen WordPress comments, rendered read-only
  ShowReadingTime: true
  ShowPostNavLinks: true
  ShowCodeCopyButtons: true
  ShowRssButtonInSectionTermList: true
  ShowShareButtons: false
  disableSpecial1stPost: true
  ShowToc: false
  hideFooter: false
  socialIcons:
    - name: github
      url: https://github.com/tylertreat
    - name: rss
      url: /feed/
  assets:
    disableHLJS: true
    favicon: /favicon.ico
    favicon16x16: /favicon.ico
    favicon32x32: /favicon.ico
    apple_touch_icon: /favicon.ico
    safari_pinned_tab: /favicon.ico

menu:
  main:
    - identifier: archive
      name: Archive
      url: /archive/
      weight: 10
    - identifier: tags
      name: Tags
      url: /tags/
      weight: 20
    - identifier: about
      name: About
      url: /about-me/
      weight: 30
