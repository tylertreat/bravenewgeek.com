name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      HUGO_VERSION: 0.164.0
    steps:
      - uses: actions/checkout@v4
      - name: Install Hugo
        run: |
          wget -qO "${{ runner.temp }}/hugo.deb" "https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.deb"
          sudo dpkg -i "${{ runner.temp }}/hugo.deb"
      - uses: actions/configure-pages@v5
      - name: Build
        run: |
          hugo --minify --logLevel warn
          # Legacy WordPress feed paths. /feed/index.html is served as
          # text/html but contains the RSS XML; most readers sniff content.
          mkdir -p public/feed
          cp public/index.xml public/feed/index.html
          cp public/index.xml public/feed.xml
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
